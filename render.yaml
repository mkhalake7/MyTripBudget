services:
  - type: web
    name: mytripbudget
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mytripbudget-db
          property: connectionString

databases:
  - name: mytripbudget-db
    plan: free
